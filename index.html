<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexo V2 — Autonomous Software Engineer</title>
  <meta name="description"
    content="Nexo V2 is an autonomous AI software engineer in your browser. Turn natural language into complete, running applications — instantly with 16 AI agents, WebContainers, and cinematic code generation." />
  <meta name="theme-color" content="#0c0c0e" />
  <meta property="og:title" content="Nexo V2 — Autonomous Software Engineer" />
  <meta property="og:description"
    content="Turn natural language into complete applications. 16 AI agents. WebContainer runtime. Zero setup." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="/src/assets/NEXO-V2.png" />
  <script src="/tailwind.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Polyfill for Buffer needed by E2B -->
  <script src="https://bundle.run/buffer@6.0.3" crossorigin></script>
  <script>
    // Theme initialization — prevent flash of wrong theme
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();

    // Safe polyfills that don't overwrite existing injected variables
    window.global = window;
    if (window.buffer) {
      window.Buffer = window.buffer.Buffer;
    }

    // Ensure process.env exists without wiping existing keys
    window.process = window.process || {};
    window.process.env = window.process.env || {};

    if (!window.process.env.NODE_ENV) {
      window.process.env.NODE_ENV = 'development';
    }
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            lovable: {
              bg: '#fbf9f6',
              surface: '#ffffff',
              primary: '#ff5e3a',
              text: '#1c1917',
              subtle: '#a8a29e',
              border: '#e7e5e4'
            },
            studio: {
              bg: '#FFFFFF',
              panel: '#F8FAFC',
              card: '#F1F5F9',
              accent: '#0ea5e9',
              secondary: '#3B82F6',
              text: '#0F172A',
              muted: '#64748B',
              border: 'rgba(15,23,42,0.09)'
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 3s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-6px)' },
            },
            glow: {
              '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
              '50%': { opacity: '0.6', transform: 'scale(1.05)' },
            },
            slideInBuild: {
              '0%': { opacity: '0', transform: 'translateX(-12px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateX(0) scale(1)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    /* ── CSS Custom Properties (Design Tokens - Studio Aesthetic) ── */
    :root {
      --nexo-bg: #fafafa;
      --nexo-surface: #ffffff;
      --nexo-surface-alt: #f4f4f5;
      --nexo-text: #09090b;
      --nexo-text-secondary: #52525b;
      --nexo-text-muted: #71717a;
      --nexo-border: #e4e4e7;
      --nexo-accent: #09090b;
      --nexo-accent-purple: #7c3aed;
      --nexo-accent-emerald: #10b981;
      --nexo-accent-amber: #f59e0b;

      /* Phase Colors */
      --nexo-phase-planning: #2563eb;
      --nexo-phase-generating: #7c3aed;
      --nexo-phase-fixing: #d97706;
      --nexo-phase-deploying: #0d9488;

      --nexo-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --nexo-shadow-lg: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --nexo-radius: 6px;
      --nexo-radius-lg: 8px;
    }

    html.dark {
      --nexo-bg: #09090b;
      --nexo-surface: #09090b;
      --nexo-surface-alt: #18181b;
      --nexo-text: #fafafa;
      --nexo-text-secondary: #a1a1aa;
      --nexo-text-muted: #71717a;
      --nexo-border: #27272a;
      --nexo-accent: #ffffff;
      --nexo-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      --nexo-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
    }

    /* ── Global Theme & Layout Overrides ── */
    body {
      background-color: var(--nexo-bg) !important;
      color: var(--nexo-text) !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    /* Pro-tools compact density workspace layout overrides */
    main.flex-1 [data-panel] {
      padding: 0.25rem !important;
      /* Extremely tight panel spacing (4px) */
    }

    main.flex-grow,
    main.pt-0 {
      padding-top: 0px !important;
    }

    /* Specific workspace split panel side paddings adjustments */
    main.flex-1 [data-panel]:first-of-type {
      padding-right: 0.125rem !important;
    }

    main.flex-1 [data-panel]:nth-of-type(3) {
      padding-left: 0.125rem !important;
      padding-right: 0.125rem !important;
    }

    main.flex-1 [data-panel]:last-of-type {
      padding-left: 0.125rem !important;
    }

    /* Compact header/sub-header sizes */
    .h-\[52px\] {
      height: 40px !important;
      /* Shrunk main navbar from 52px to 40px */
    }

    .h-11 {
      height: 32px !important;
      /* Shrunk secondary toolbar from 44px to 32px */
    }

    .pt-20 {
      padding-top: 52px !important;
      /* Adjusted top padding */
    }

    /* Pro-tools tight border-radius specifications */
    .rounded-2xl,
    .rounded-\[2rem\] {
      border-radius: var(--nexo-radius-lg) !important;
    }

    .rounded-xl {
      border-radius: var(--nexo-radius) !important;
    }

    .rounded-lg {
      border-radius: 6px !important;
    }

    .rounded-md {
      border-radius: 4px !important;
    }

    /* Dynamic UI Color Overrides for light & dark themes */
    .bg-white,
    [class*="bg-white"],
    .bg-studio-bg {
      background-color: var(--nexo-surface) !important;
    }

    .bg-\[\#f8fafc\],
    .bg-\[\#f7f7f7\],
    .bg-studio-panel {
      background-color: var(--nexo-bg) !important;
    }

    .bg-\[\#f3f3f3\],
    .bg-stone-50,
    .bg-studio-card {
      background-color: var(--nexo-surface-alt) !important;
    }

    .bg-stone-900 {
      background-color: var(--nexo-accent) !important;
      color: var(--nexo-bg) !important;
    }

    /* Borders */
    .border-\[\#e8e8e8\],
    .border-stone-200,
    .border-studio-border {
      border-color: var(--nexo-border) !important;
    }

    .border-stone-100 {
      border-color: var(--nexo-border) !important;
      opacity: 0.6;
    }

    /* Text Colors */
    .text-\[\#111\],
    .text-\[\#333\],
    .text-stone-900,
    .text-stone-700,
    .text-studio-text {
      color: var(--nexo-text) !important;
    }

    .text-\[\#555\],
    .text-stone-600,
    .text-stone-500,
    .text-studio-muted {
      color: var(--nexo-text-secondary) !important;
    }

    .text-\[\#888\],
    .text-stone-400 {
      color: var(--nexo-text-muted) !important;
    }

    .hover\:text-\[\#111\]:hover {
      color: var(--nexo-text) !important;
    }

    .hover\:bg-\[\#f3f3f3\]:hover {
      background-color: var(--nexo-surface-alt) !important;
    }

    /* ── Markdown/Prose Styling for Chat Bubbles and Dark Mode ── */
    .prose {
      color: var(--nexo-text) !important;
    }

    .prose strong,
    .prose h1,
    .prose h2,
    .prose h3,
    .prose h4,
    .prose th {
      color: var(--nexo-text) !important;
    }

    .prose code {
      color: var(--nexo-accent-purple) !important;
      background-color: var(--nexo-surface-alt) !important;
      padding: 0.125rem 0.25rem !important;
      border-radius: 4px !important;
      font-size: 85% !important;
    }

    .prose pre {
      background-color: var(--nexo-surface-alt) !important;
      border: 1px solid var(--nexo-border) !important;
      padding: 0.75rem !important;
      border-radius: var(--nexo-radius) !important;
    }

    .prose pre code {
      background-color: transparent !important;
      padding: 0 !important;
      color: var(--nexo-text) !important;
    }

    .prose a {
      color: #3b82f6 !important;
      text-decoration: underline !important;
    }

    /* User Message Bubbles overrides (always dark #111 background) */
    .chat-msg-user .prose,
    .bg-\[\#111\] .prose {
      color: #ffffff !important;
    }

    .chat-msg-user .prose strong,
    .chat-msg-user .prose h1,
    .chat-msg-user .prose h2,
    .chat-msg-user .prose h3,
    .chat-msg-user .prose h4,
    .chat-msg-user .prose th,
    .bg-\[\#111\] .prose strong,
    .bg-\[\#111\] .prose h1,
    .bg-\[\#111\] .prose h2,
    .bg-\[\#111\] .prose h3,
    .bg-\[\#111\] .prose h4,
    .bg-\[\#111\] .prose th {
      color: #ffffff !important;
    }

    .chat-msg-user .prose code,
    .bg-\[\#111\] .prose code {
      color: #ffd8a8 !important;
      background-color: rgba(255, 255, 255, 0.12) !important;
    }

    .chat-msg-user .prose pre,
    .bg-\[\#111\] .prose pre {
      background-color: rgba(0, 0, 0, 0.2) !important;
      border-color: rgba(255, 255, 255, 0.1) !important;
    }

    .chat-msg-user .prose pre code,
    .bg-\[\#111\] .prose pre code {
      color: #fafafa !important;
    }

    .chat-msg-user .prose a,
    .bg-\[\#111\] .prose a {
      color: #38bdf8 !important;
    }

    /* Dark Mode specific prose overrides for assistant and general markdown */
    html.dark .prose {
      color: var(--nexo-text) !important;
    }

    html.dark .prose code {
      color: #ffd8a8 !important;
      background-color: rgba(255, 255, 255, 0.08) !important;
    }

    html.dark .prose pre code {
      color: var(--nexo-text) !important;
    }

    html.dark .prose a {
      color: #38bdf8 !important;
    }


    input:not([type="checkbox"]):not([type="radio"]),
    select {
      background-color: var(--nexo-surface-alt) !important;
      color: var(--nexo-text) !important;
      border-color: var(--nexo-border) !important;
      border-radius: var(--nexo-radius) !important;
    }

    textarea:not(.bg-transparent) {
      background-color: var(--nexo-surface-alt) !important;
      color: var(--nexo-text) !important;
      border-color: var(--nexo-border) !important;
      border-radius: var(--nexo-radius) !important;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--nexo-accent-purple) !important;
      outline: none;
    }

    .shadow-sm {
      box-shadow: var(--nexo-shadow) !important;
    }

    .shadow-md,
    .shadow-xl,
    .shadow-2xl {
      box-shadow: var(--nexo-shadow-lg) !important;
    }

    /* Clean separator lines for Resizable Panels */
    [data-panel-resize-handle] {
      width: 4px !important;
      background-color: transparent !important;
      position: relative;
      transition: background-color 0.2s ease;
    }

    [data-panel-resize-handle]:hover,
    [data-panel-resize-handle][data-active] {
      background-color: rgba(124, 58, 237, 0.06) !important;
    }

    [data-panel-resize-handle]::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
      background-color: var(--nexo-border);
      transition: background-color 0.2s ease;
    }

    [data-panel-resize-handle]:hover::after,
    [data-panel-resize-handle][data-active]::after {
      background-color: var(--nexo-accent-purple);
    }

    /* High-density scrollbars */
    ::-webkit-scrollbar {
      width: 5px !important;
      height: 5px !important;
    }

    ::-webkit-scrollbar-track {
      background: transparent !important;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--nexo-border) !important;
      border-radius: 99px !important;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--nexo-text-muted) !important;
    }

    /* Custom scrollbar for chat */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Feature card backgrounds in dark mode */
    html.dark .bg-indigo-50 {
      background-color: rgba(99, 102, 241, 0.12) !important;
    }

    html.dark .bg-purple-50 {
      background-color: rgba(139, 92, 246, 0.12) !important;
    }

    html.dark .bg-emerald-50 {
      background-color: rgba(16, 185, 129, 0.12) !important;
    }

    html.dark .bg-sky-50 {
      background-color: rgba(14, 165, 233, 0.12) !important;
    }

    html.dark .bg-amber-50 {
      background-color: rgba(245, 158, 11, 0.12) !important;
    }

    html.dark .bg-rose-50 {
      background-color: rgba(244, 63, 94, 0.12) !important;
    }

    html.dark .bg-blue-50 {
      background-color: rgba(59, 130, 246, 0.12) !important;
    }

    html.dark .bg-red-50 {
      background-color: rgba(239, 68, 68, 0.12) !important;
    }

    html.dark .bg-green-50 {
      background-color: rgba(34, 197, 94, 0.12) !important;
    }

    /* ── Cinematic Glassmorphism ── */
    .glass-panel {
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-card {
      background: rgba(17, 24, 39, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glow-border:hover {
      border-color: rgba(124, 58, 237, 0.4);
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.15);
    }

    /* ── Phase Color Accents ── */
    .phase-planning {
      --phase-color: var(--nexo-phase-planning);
    }

    .phase-generating {
      --phase-color: var(--nexo-phase-generating);
    }

    .phase-fixing {
      --phase-color: var(--nexo-phase-fixing);
    }

    .phase-deploying {
      --phase-color: var(--nexo-phase-deploying);
    }

    @keyframes slideInBuild {
      0% {
        opacity: 0;
        transform: translateX(-12px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
  </style>
  <link rel="stylesheet" href="/src/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
