    <!-- Polyfill for Buffer needed by E2B -->
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script>
      // Safe polyfills that don't overwrite existing injected variables
      
      // Make window.fetch writable so libraries can assign to it/redefine it if needed
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          value: originalFetch,
          writable: true,
          configurable: true
        });
      } catch (e) {
        console.warn('Could not make window.fetch writable:', e);
      }

      // Safe global alias that handles writes to read-only properties (like fetch)
      const globalProxyProps = {};
      window.global = new Proxy(window, {
        set(target, prop, value) {
          try {
            target[prop] = value;
          } catch (e) {
            globalProxyProps[prop] = value;
          }
          return true;
        },
        get(target, prop) {
          if (prop in globalProxyProps) {
            return globalProxyProps[prop];
          }
          const val = target[prop];
          if (typeof val === 'function') {
            return val.bind(target);
          }
          return val;
        }
      });

      if (window.buffer) {
        window.Buffer = window.buffer.Buffer;
      }
      
      // Ensure process.env exists without wiping existing keys (like API_KEY)
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      
      // Set the API key if not already present (User provided key)
      if (!window.process.env.API_KEY) {
        window.process.env.API_KEY = 'AIzaSyC-hzbGif2NS0WzntKQgT-uD8adfGjEbTo';
      }

      if (!window.process.env.NODE_ENV) {
        window.process.env.NODE_ENV = 'development';
      }
    </script>
