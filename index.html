<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexo v2 - Build Your Own Companion</title>
  <link rel="icon" type="image/png" href="/src/assets/NEXO-V2.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Polyfill for Buffer needed by E2B -->
  <script src="https://bundle.run/buffer@6.0.3"></script>
  <script>
    // Safe polyfills that don't overwrite existing injected variables
    window.global = window;
    if (window.buffer) {
      window.Buffer = window.buffer.Buffer;
    }

    // Ensure process.env exists without wiping existing keys (like API_KEY)
    window.process = window.process || {};
    window.process.env = window.process.env || {};

    // Set the API key if not already present (User provided key)
    if (!window.process.env.API_KEY) {
      window.process.env.API_KEY = 'AIzaSyBdwndziQV1EcJkzxjMkzq3HrL2u-YCQ7c';
    }

    if (!window.process.env.NODE_ENV) {
      window.process.env.NODE_ENV = 'development';
    }
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            lovable: {
              bg: '#fbf9f6',
              surface: '#ffffff',
              primary: '#ff5e3a',
              text: '#1c1917',
              subtle: '#a8a29e',
              border: '#e7e5e4'
            },
             studio: {
              bg: '#FFFFFF',
              panel: '#F8FAFC',
              card: '#F1F5F9',
              accent: '#0ea5e9',
              secondary: '#3B82F6',
              text: '#0F172A',
              muted: '#64748B',
              border: 'rgba(15,23,42,0.09)'
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 3s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-6px)' },
            },
            glow: {
              '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
              '50%': { opacity: '0.6', transform: 'scale(1.05)' },
            },
            slideInBuild: {
              '0%': { opacity: '0', transform: 'translateX(-12px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateX(0) scale(1)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #FFFFFF;
      color: #0F172A;
    }

    /* Premium custom scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(15, 23, 42, 0.12);
      border-radius: 99px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(14, 165, 233, 0.35);
    }

    /* Custom scrollbar for chat */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Cinematic Glassmorphism Classes */
    .glass-panel {
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-card {
      background: rgba(17, 24, 39, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glow-border:hover {
      border-color: rgba(14, 165, 233, 0.4);
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.15);
    }

    @keyframes slideInBuild {
      0% {
        opacity: 0;
        transform: translateX(-12px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
  </style>
  <link rel="stylesheet" href="/src/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
